{% load wagtailcore_tags bg_tags %}
<div class="block-layout block-layout--{{ self.width }} block-layout--align-{{ self.alignment }} block-layout--valign-{{ self.vertical_alignment|default:'top' }} {% bg_classes self.background_color self.full_width_background %}">
<div class="embed-block">

    <div class="embed-block__content">
        {{ self.url }}
    </div>

    {% if self.caption %}
    <p class="embed-block__caption">{{ self.caption }}</p>
    {% endif %}

</div>
</div>
