{% load wagtailcore_tags %}
<div class="accordion{% if self.header_color != 'default' %} accordion--header-{{ self.header_color }}{% endif %}{% if self.content_color != 'default' %} accordion--content-{{ self.content_color }}{% endif %}">
    {% for item in self.items %}
    <details class="accordion__item">
        <summary class="accordion__header">
            <span class="accordion__title">{{ item.title }}</span>
            <svg class="accordion__chevron" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </summary>
        <div class="accordion__content">
            {{ item.content|richtext }}
        </div>
    </details>
    {% endfor %}
</div>
