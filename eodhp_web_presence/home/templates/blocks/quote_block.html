{% load wagtailcore_tags bg_tags mdi_tags %}
<div class="block-layout block-layout--{{ self.width }} block-layout--align-{{ self.alignment }} block-layout--valign-{{ self.vertical_alignment|default:'top' }}{% if self.full_width_background %} {% bg_classes self.background_color True %}{% endif %}">
<blockquote class="quote-block {% bg_classes self.background_color %} quote-block--size-{{ self.font_size|default:'default' }} quote-block--weight-{{ self.font_weight|default:'normal' }} quote-block--style-{{ self.font_style|default:'italic' }}">
    {% if self.icon_name %}{% mdi_icon self.icon_name self.icon_size %}{% endif %}
    <p class="quote-block__text">{{ self.quote|linebreaksbr }}</p>
    {% if self.attribution %}
    <footer class="quote-block__attribution">&mdash; {{ self.attribution }}</footer>
    {% endif %}
</blockquote>
</div>
