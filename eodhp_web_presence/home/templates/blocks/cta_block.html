{% load wagtailcore_tags bg_tags %}
<div class="block-layout block-layout--{{ self.width }} block-layout--align-{{ self.alignment }} block-layout--valign-{{ self.vertical_alignment|default:'top' }}{% if self.full_width_background %} {% bg_classes self.background_color True %}{% endif %}">
<div class="cta-block{% if not self.full_width_background %} {% bg_classes self.background_color %}{% endif %}">
    {% if self.link_page %}
    <a href="{% pageurl self.link_page %}" class="button {{ self.button_style }}-button">{{ self.text }}</a>
    {% elif self.link_url %}
    <a href="{{ self.link_url }}" class="button {{ self.button_style }}-button">{{ self.text }}</a>
    {% endif %}
</div>
</div>
