{% extends "base.html" %}

{% block title %}CSRF verification failed{% endblock %}

{% block body_class %}template-error{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-page__content">
        <h1 class="error-page__code">403</h1>
        <h2 class="error-page__title">CSRF verification failed</h2>
        <p class="error-page__message">The security token for this form has expired. Please go back and submit the form again.</p>
        <div class="error-page__actions">
            <a href="/" class="button primary-button">Go home</a>
        </div>
    </div>
</div>
{% endblock %}
