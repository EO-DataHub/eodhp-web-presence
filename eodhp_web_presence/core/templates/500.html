{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Internal server error</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html {
            font-family: 'Fira Sans', sans-serif;
        }

        body {
            background-color: #fff;
            color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .branding {
            margin-bottom: 2rem;
            font-weight: 700;
            font-size: 1.25rem;
            color: #1a273f;
        }

        .branding a {
            text-decoration: none;
            color: inherit;
        }

        .branding span {
            color: #4c72ba;
        }

        .error-page {
            max-width: 600px;
        }

        .error-page__code {
            font-size: clamp(80px, 15vw, 150px);
            font-weight: 700;
            line-height: 1;
            color: #4c72ba;
            margin-bottom: 0.5rem;
            opacity: 0.9;
            letter-spacing: -0.04em;
        }

        .error-page__title {
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .error-page__message {
            font-size: 18px;
            color: #969696;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .error-page__actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .button {
            padding: 5px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-family: 'Fira Sans', sans-serif;
            font-size: 16px;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .button--primary {
            background-color: #4c72ba;
            color: #fff;
        }

        .button--primary:hover {
            background-color: #3f64ab;
            text-decoration: none;
        }

        .button--secondary {
            background-color: transparent;
            color: #4c72ba;
            border: 1px solid #4c72ba;
        }

        .button--secondary:hover {
            background-color: #f3f3f3;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="branding">
        <a href="/" style="text-decoration: none;">
            <span>EO</span> Data Hub
        </a>
    </div>
    <div class="error-page">
        <h1 class="error-page__code">500</h1>
        <h2 class="error-page__title">Internal server error</h2>
        <p class="error-page__message">Sorry, there seems to be an error. Please try again soon.</p>
        <div class="error-page__actions">
            <a href="/" class="button button--primary">Go home</a>
        </div>
    </div>
</body>
</html>
